# isolinux.cfg - LeakOS Live ISO Boot Menu
# Compatible: BIOS/Legacy boot via isolinux

UI menu.c32

MENU TITLE LeakOS Live Boot Menu
MENU BACKGROUND splash.png

MENU COLOR title        1;36;40  #ff6600ff #00000000 std
MENU COLOR border       30;40    #40ffffff #a0000000 std
MENU COLOR sel          7;37;40  #ffffffff #a0000000 std
MENU COLOR unsel        37;40    #7fffffff #a0000000 std
MENU COLOR tabmsg       31;40    #ff3333ff #00000000 std
MENU COLOR cmdmark      1;36;40  #ffff00ff #00000000 std
MENU COLOR cmdline      37;40    #ffffffff #00000000 std
MENU COLOR timeout_msg  37;40    #7fffffff #00000000 std
MENU COLOR timeout      1;37;40  #ffffffff #00000000 std
MENU COLOR help         37;40    #7fffffff #00000000 std
MENU COLOR disabled     1;30;40  #7fffffff #00000000 std

TIMEOUT 100
# 100 = 10 detik (satuan 1/10 detik)

MENU TABMSG Press TAB to edit | ENTER to select | ESC to cancel

DEFAULT live

##############################################
LABEL live
  MENU LABEL ^Boot LeakOS Live
  MENU DEFAULT
  KERNEL /boot/vmlinuz
  APPEND initrd=/boot/initrd.img quiet splash

##############################################
LABEL nomodeset
  MENU LABEL Boot LeakOS Live (^nomodeset)
  KERNEL /boot/vmlinuz
  APPEND initrd=/boot/initrd.img quiet splash nomodeset

##############################################
LABEL debug
  MENU LABEL Boot LeakOS Live (^Debug mode)
  KERNEL /boot/vmlinuz
  APPEND initrd=/boot/initrd.img debug rootdelay=5

##############################################
LABEL toram
  MENU LABEL Boot LeakOS Live (^To RAM)
  KERNEL /boot/vmlinuz
  APPEND initrd=/boot/initrd.img quiet splash toram

##############################################
LABEL memtest
  MENU LABEL ^Memory Test (memtest86+)
  KERNEL /boot/memtest86+

##############################################
LABEL local
  MENU LABEL Boot from ^local disk
  LOCALBOOT 0x80
